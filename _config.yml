title: "Madden Mandel's Blog"  # 博客标题
description: "一个基于 Minimal Mistakes 的技术博客"  # 博客描述
url: "https://MaddenMandel.github.io"  # 你的博客地址
baseurl: ""  # 如果你是根目录，请保持为空
author:
  name: "Madden Mandel"
  email: "zhangxuegang@gmail.com"
  avatar: "/assets/images/avatar.png"  # 头像路径，可用默认或自定义图片
  description: "一个喜欢分享技术的开发者"

theme: minimal-mistakes-jekyll

plugins:
  - jekyll-feed  # RSS 支持
  - jekyll-seo-tag  # SEO 支持
  - jekyll-sitemap  # 网站地图
  - jekyll-paginate  # 分页支持

markdown: kramdown  # 默认使用 kramdown 渲染 Markdown
paginate: 5  # 每页显示的文章数